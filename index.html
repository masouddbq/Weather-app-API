<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="box">
            <div class="box-title">
                <h1>Weather app</h1>
            </div>
            <div class="box-tools">
                <input type="text" placeholder="Enter city name">
                <button>Search</button>
            </div>
        </div>
        <div class="weather-info hide">
            <div class="today">
                <div class="primary-info">
                    <div>
                        <h1 class="city"></h1>
                        <div class="date hide">
                            <span class="month"></span>
                            <span class="month-day"></span>
                            <span class="week-day"></span>
                        </div>
                    </div>
                    <div class="weather-icon">
                        <p class="weather-desc hide"></p>
                        <img src="./images/vecteezy_sunny-weather-icon-with-clouds-sunshine-and-sky-on_69651439.png" alt="">
                    </div>
                </div>
                <div class="secondary-info">
                    <div>
                        <span class="temp"></span>
                        <span class="degree hide">°C</span>
                    </div>
                    <div>
                        <span class="feels-like"></span>
                        <span class="humidity"></span>
                    </div>
                </div>
                <div class="five-hours"></div>
                <div class="detail">
                    <div class="parameter wind">
                        <span class="wind-title">WINDSPEED</span>
                        <span class="wind-num"></span>
                    </div>
                    <div class="parameter max">
                        <span class="max-title">TEMP-MAX</span>
                        <span class="max-num"></span>
                    </div>
                    <div class="parameter sea">
                        <span class="level-title">SEA-LEVEL</span>
                        <span class="level-num"></span>
                    </div>
                </div>
            </div>
            <div class="next-days">
            </div>
            <!-- <div class="weather-icon">
                <img src="./images/cloudy.png" alt="">
            </div>
            <div class="weather-temp">
                <h2>City name</h2>
                <p></p>
            </div>
            <div class="weather-desc">
                <h3>information</h3>
            </div> -->
        </div>
    </div>
    
    <script src="./script.js"></script>
</body>
</html>
